<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fond bleu marine -->
  <rect width="100" height="100" rx="32" fill="#0F172A"/>

  <!-- 4 flèches formant le × -->
  <!-- Haut-gauche -->
  <path d="M 46 46 Q 28 25 17 17" stroke="white" stroke-width="7" fill="none" stroke-linecap="round"/>
  <g transform="translate(17 17) rotate(-135)">
    <polygon points="0,0 10,4 10,-4" fill="white"/>
  </g>
  <!-- Haut-droite -->
  <path d="M 54 46 Q 72 25 83 17" stroke="white" stroke-width="7" fill="none" stroke-linecap="round"/>
  <g transform="translate(83 17) rotate(-45)">
    <polygon points="0,0 10,4 10,-4" fill="white"/>
  </g>
  <!-- Bas-droite -->
  <path d="M 54 54 Q 72 75 83 83" stroke="white" stroke-width="7" fill="none" stroke-linecap="round"/>
  <g transform="translate(83 83) rotate(45)">
    <polygon points="0,0 10,4 10,-4" fill="white"/>
  </g>
  <!-- Bas-gauche -->
  <path d="M 46 54 Q 28 75 17 83" stroke="white" stroke-width="7" fill="none" stroke-linecap="round"/>
  <g transform="translate(17 83) rotate(135)">
    <polygon points="0,0 10,4 10,-4" fill="white"/>
  </g>

  <!-- 12 étoiles sur un cercle r=42 (rendues en petits cercles à cette taille) -->
  <circle cx="50.00" cy="8.00"  r="2.8" fill="white"/>
  <circle cx="71.00" cy="13.63" r="2.8" fill="white"/>
  <circle cx="86.37" cy="29.00" r="2.8" fill="white"/>
  <circle cx="92.00" cy="50.00" r="2.8" fill="white"/>
  <circle cx="86.37" cy="71.00" r="2.8" fill="white"/>
  <circle cx="71.00" cy="86.37" r="2.8" fill="white"/>
  <circle cx="50.00" cy="92.00" r="2.8" fill="white"/>
  <circle cx="29.00" cy="86.37" r="2.8" fill="white"/>
  <circle cx="13.63" cy="71.00" r="2.8" fill="white"/>
  <circle cx="8.00"  cy="50.00" r="2.8" fill="white"/>
  <circle cx="13.63" cy="29.00" r="2.8" fill="white"/>
  <circle cx="29.00" cy="13.63" r="2.8" fill="white"/>
</svg>
